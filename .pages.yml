media:
  input: src/assets
  output: /assets

content:
  - name: "projects"
    label: "Projects"
    type: "collection"
    path: "src/content/projects"
    fields:
      - name: "title"
        label: "Title"
        type: "string"
        required: true 
      - name: "author"
        label: "Author" 
        type: "string" 
      - name: "slug"
        label: "Slug"
        type: "string" 
      - name: "draft"
        label: "Draft"
        type: "boolean" 
      - name: "cover"
        label: "Cover Image"
        type: "image"
      - name: "video" 
        label: "Video"
        type: "image"
        options:
          path: "/assets/videos"
          extensions: ["mp4"] 
      - name: "description" 
        label: "Description"
        type: "text" 
      - name: "body"
        label: "Content"
        type: "rich-text" 
  - name: "index"
    label: "Home Page"
    type: "file"
    path: "src/pages/index.astro"
    fields: 
      - name: "src/pages/index.astro"
        label: "SEO Settings"
        type: "object"
        fields:
        - name: "title"
          label: "Title"
          type: "string"
        - name: "description"
          label: "Description"
          type: "string"