media:
  - input: src/assets
  - output: /assets

content:
  - name: "projects"
    label: "Projects"
    type: "collection"
    path: "src/content/projects"
    fields:
      - { name: "title", label: "Title", type: "string", required: true }
      - { name: "author", label: "Author", type: "string" }
      - { name: "slug", label: "Slug", type: "string" }
      - { name: "draft", label: "Draft", type: "boolean" }
      - { name: "cover", label: "Cover Image", type: "image" }
      - { name: "description", label: "Description", type: "text" }
      - { name: "video", label: "Video", type: "string" }
      - { name: "body", label: "Content", type: "rich-text" }

  - name: "index"
    label: "Homepage"
    file: "src/pages/index.astro"
    fields:
      - { name: "h1", label: "Main Heading (H1)", widget: "string" }
      - { name: "h2", label: "Subheading (H2)", widget: "string" }
      - { name: "description", label: "About Section Description", widget: "text" }